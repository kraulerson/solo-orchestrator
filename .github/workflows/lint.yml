# .github/workflows/lint.yml — CI lint guards.
#
# Wave 2 follow-up to PRs #67-#71 (counter-sanitizer remediation
# bundle). After wave 1 fixed every known unsanitized
# `var=$(cmd | grep -c X || echo "0")` capture site, this workflow
# is the merge-time backstop that prevents the antipattern from being
# reintroduced. See scripts/lint-counter-antipattern.sh for the
# defect-class write-up and the canonical fix pattern.
#
# This is the repository's FIRST GitHub Actions workflow — the
# `.github/workflows/` directory did not exist before this PR.
# Subsequent CI jobs (shellcheck, security review, full test suite
# under CI, etc.) can be added as additional workflows or as
# additional jobs in this file.

name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job name is the required-check label in branch protection. Keep it
  # stable: changing the name forces every protected branch to be
  # reconfigured. The lint script's behavior may evolve, but the job
  # name should not.
  counter-antipattern-lint:
    name: counter-antipattern-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint counter-capture antipattern
        run: bash scripts/lint-counter-antipattern.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-counter-antipattern.sh --list || true

  # Cycle-7 Slot-5 sibling backstop: process discipline for backlog
  # citations. See scripts/lint-backlog-references.sh header for the
  # defect classes (unknown-ref + uncited-closure) and the allowlist
  # mechanism. Same job-name-is-required-check convention as the
  # counter-antipattern job above — keep the name stable.
  backlog-references-lint:
    name: backlog-references-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
        with:
          fetch-depth: 0  # required for `git log BASE..HEAD` resolution

      - name: Lint backlog references
        # `github.base_ref` is user-controlled context data. To avoid
        # the shell-injection class flagged by Semgrep rule
        # yaml.github-actions.security.run-shell-injection (see
        # https://sg.run/pkzk), route it through an `env:` var and
        # reference the quoted env var inside the script rather than
        # interpolating `${{ ... }}` directly into a `run:` shell line.
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: bash scripts/lint-backlog-references.sh --base "origin/${BASE_REF}"

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: bash scripts/lint-backlog-references.sh --base "origin/${BASE_REF}" --list || true

  # Cycle-8 wave-3 Slot-5 sibling: ban `2>/dev/null` and `2>&-`
  # inside any `fix_*()` function body. See
  # scripts/lint-fix-functions-stderr.sh header for the defect class
  # (silenced auto-fix stderr makes failures un-actionable for
  # operators running under --auto-fix). The PR #92 scrub of
  # fix_framework_clone / fix_framework_manifest / fix_superpowers
  # established the precedent; this lint is the merge-time backstop.
  fix-functions-stderr-lint:
    name: fix-functions-stderr-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint fix_*() function stderr silencers
        run: bash scripts/lint-fix-functions-stderr.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-fix-functions-stderr.sh --list || true

  # Cycle-8 wave-3 Slot-5 sibling: ban raw `read -rp` / `read -p`
  # outside scripts/lib/helpers.sh — the canonical home for the
  # prompt_input / prompt_yes_no helpers that handle non-interactive
  # / CI / no-TTY contexts safely. See
  # scripts/lint-raw-read-prompt.sh header for the defect class
  # (bare `read -p` hangs unattended invocations or auto-defaults
  # without operator confirmation).
  raw-read-prompt-lint:
    name: raw-read-prompt-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint raw read -rp / read -p sites
        run: bash scripts/lint-raw-read-prompt.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-raw-read-prompt.sh --list || true

  # BL-038 (cycle-9): structural backstop for the BL-034 orphan-test
  # defect class — refuses to merge a new tests/test-*.sh file unless
  # an aggregator invokes it (or the file carries an EXEMPT marker
  # with a non-empty reason). See scripts/lint-tests-registered.sh
  # header for the contract + KNOWN_ORPHANS_PENDING_BL035 bridge,
  # and tests/test-lint-tests-registered.sh for the behavior suite.
  tests-registered-lint:
    name: tests-registered-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint tests-registered (BL-038 structural backstop)
        run: bash scripts/lint-tests-registered.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-tests-registered.sh --list || true

  # BL-048: structural backstop for dead in-document anchors under
  # docs/ — a `[text](#anchor)` link whose target heading no longer
  # exists (renamed, reworded, or removed) silently 404s in the
  # rendered page instead of failing anything locally. See
  # scripts/lint-doc-anchors.sh header for the GitHub-slug derivation
  # + fence-aware scanning contract, and
  # tests/test-lint-doc-anchors.sh for the behavior suite.
  doc-anchors-lint:
    name: doc-anchors-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint in-document anchors under docs/ (BL-048)
        run: bash scripts/lint-doc-anchors.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-doc-anchors.sh --list || true

  # BL-073: schema backstop for the Phase 3→4 review manifest
  # (docs/eval-results/review-manifest.json). check-phase-gate.sh's
  # track-aware review gate reads .reviews[].reviewer / .status to decide
  # whether the mandatory Security + Red Team reviews are complete — a
  # malformed manifest silently defeats that gate. This lint pins the
  # schema (reviewer / status / artifact required; date / signed_by
  # validated when present). See scripts/lint-review-manifest.sh header
  # and tests/test-bl073-review-manifest-gate.sh for the behavior suite.
  review-manifest-lint:
    name: review-manifest-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint review-manifest schema (BL-073)
        run: bash scripts/lint-review-manifest.sh

      - name: Show roster (on failure or on demand)
        if: always()
        run: bash scripts/lint-review-manifest.sh --list || true

  # BL-076: hermeticity backstop for the test suite. A test that runs the
  # real init.sh with the default (github) host and WITHOUT
  # --no-remote-creation / --git-host other / a mocked gh creates + pushes a
  # REAL private repo on an authenticated host (the kraulerson/foo leak,
  # 2026-07-06) — and blocks the suite from ever running in CI ([[bl077]]).
  # This lint refuses to merge any test whose init.sh invocation can reach
  # live remote creation. See scripts/lint-no-live-remote-in-tests.sh header
  # and tests/test-lint-no-live-remote.sh for the behavior suite. Same
  # job-name-is-required-check convention as the jobs above — keep it stable.
  no-live-remote-in-tests-lint:
    name: no-live-remote-in-tests-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint tests for live-remote-reachable init.sh runs (BL-076)
        run: bash scripts/lint-no-live-remote-in-tests.sh

      - name: Run the lint's own behavior suite
        run: bash tests/test-lint-no-live-remote.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-no-live-remote-in-tests.sh --list || true

  # BL-103: portability backstop for evaluation-prompts/. The Phase 3→4 review
  # gate (BL-073) hands operators `evaluation-prompts/Projects/run-reviews.sh` as
  # its remediation — and that script (plus compose.sh and the Framework runner)
  # used `declare -A` + `[[ -v x ]]`, bash >= 4.2 constructs that macOS
  # /bin/bash 3.2.57 cannot even PARSE. Every other portability rule in this repo
  # is lint-enforced over scripts/ and init.sh; evaluation-prompts/ was uncovered,
  # which is how three shipped scripts sat dead. See
  # scripts/lint-evalprompts-portability.sh header and
  # tests/test-bl103-eval-generator.sh for the behavior suite. Same
  # job-name-is-required-check convention as the jobs above — keep it stable.
  evalprompts-portability-lint:
    name: evalprompts-portability-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - name: Lint evaluation-prompts/ for bash-4 constructs (BL-103)
        run: bash scripts/lint-evalprompts-portability.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-evalprompts-portability.sh --list || true
