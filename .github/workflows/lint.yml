# .github/workflows/lint.yml — CI lint guards.
#
# Wave 2 follow-up to PRs #67-#71 (counter-sanitizer remediation
# bundle). After wave 1 fixed every known unsanitized
# `var=$(cmd | grep -c X || echo "0")` capture site, this workflow
# is the merge-time backstop that prevents the antipattern from being
# reintroduced. See scripts/lint-counter-antipattern.sh for the
# defect-class write-up and the canonical fix pattern.
#
# This is the repository's FIRST GitHub Actions workflow — the
# `.github/workflows/` directory did not exist before this PR.
# Subsequent CI jobs (shellcheck, security review, full test suite
# under CI, etc.) can be added as additional workflows or as
# additional jobs in this file.

name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job name is the required-check label in branch protection. Keep it
  # stable: changing the name forces every protected branch to be
  # reconfigured. The lint script's behavior may evolve, but the job
  # name should not.
  counter-antipattern-lint:
    name: counter-antipattern-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint counter-capture antipattern
        run: bash scripts/lint-counter-antipattern.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-counter-antipattern.sh --list || true

  # Cycle-7 Slot-5 sibling backstop: process discipline for backlog
  # citations. See scripts/lint-backlog-references.sh header for the
  # defect classes (unknown-ref + uncited-closure) and the allowlist
  # mechanism. Same job-name-is-required-check convention as the
  # counter-antipattern job above — keep the name stable.
  backlog-references-lint:
    name: backlog-references-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for `git log BASE..HEAD` resolution

      - name: Lint backlog references
        # `github.base_ref` is user-controlled context data. To avoid
        # the shell-injection class flagged by Semgrep rule
        # yaml.github-actions.security.run-shell-injection (see
        # https://sg.run/pkzk), route it through an `env:` var and
        # reference the quoted env var inside the script rather than
        # interpolating `${{ ... }}` directly into a `run:` shell line.
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: bash scripts/lint-backlog-references.sh --base "origin/${BASE_REF}"

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: bash scripts/lint-backlog-references.sh --base "origin/${BASE_REF}" --list || true

  # Cycle-8 wave-3 Slot-5 sibling: ban `2>/dev/null` and `2>&-`
  # inside any `fix_*()` function body. See
  # scripts/lint-fix-functions-stderr.sh header for the defect class
  # (silenced auto-fix stderr makes failures un-actionable for
  # operators running under --auto-fix). The PR #92 scrub of
  # fix_framework_clone / fix_framework_manifest / fix_superpowers
  # established the precedent; this lint is the merge-time backstop.
  fix-functions-stderr-lint:
    name: fix-functions-stderr-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint fix_*() function stderr silencers
        run: bash scripts/lint-fix-functions-stderr.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-fix-functions-stderr.sh --list || true

  # Cycle-8 wave-3 Slot-5 sibling: ban raw `read -rp` / `read -p`
  # outside scripts/lib/helpers.sh — the canonical home for the
  # prompt_input / prompt_yes_no helpers that handle non-interactive
  # / CI / no-TTY contexts safely. See
  # scripts/lint-raw-read-prompt.sh header for the defect class
  # (bare `read -p` hangs unattended invocations or auto-defaults
  # without operator confirmation).
  raw-read-prompt-lint:
    name: raw-read-prompt-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint raw read -rp / read -p sites
        run: bash scripts/lint-raw-read-prompt.sh

      - name: Show PASS/FAIL inventory (on failure or on demand)
        if: always()
        run: bash scripts/lint-raw-read-prompt.sh --list || true
