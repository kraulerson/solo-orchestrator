# solo-orchestrator: platforms=mobile,desktop,web
image: dart:stable
pipelines:
  default:
    - step:
        name: Test
        script: [dart pub get, dart analyze, dart test]
    - step:
        name: Secrets
        image: ghcr.io/gitleaks/gitleaks:v8.30.1
        script: [gitleaks dir . --verbose --redact]
    - step:
        name: Governance
        image: bash:5
        script: [apk add --no-cache jq git, bash scripts/check-phase-gate.sh]
