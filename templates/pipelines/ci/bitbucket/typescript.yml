# solo-orchestrator: platforms=web,desktop,mobile,mcp_server
image: node:20

definitions:
  caches:
    node: node_modules

pipelines:
  default:
    - parallel:
        - step:
            name: Lint + Test
            caches: [node]
            script:
              - npm ci
              - npm run lint
              - npm test -- --ci
        - step:
            name: SAST
            image: semgrep/semgrep:1.170.0
            script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
        - step:
            name: Secrets
            image: ghcr.io/gitleaks/gitleaks:v8.30.1
            script: [gitleaks dir . --verbose --redact]
        - step:
            name: Dependencies
            caches: [node]
            # BL-160-AUDIT-SCOPE: blocking arm audits shipped deps only
            # (--omit=dev); dev-toolchain advisories loud, non-blocking
            # (BL-122/BL-149 false-FAIL doctrine — never a silent skip).
            script:
              - npm ci
              - npm audit --omit=dev --audit-level=moderate
              - 'npm audit --audit-level=moderate || echo "WARNING dev-toolchain advisories or audit failure (non-blocking) - run npm audit locally"'
    - step:
        name: Governance
        image: bash:5
        script: [apk add --no-cache jq git, bash scripts/check-phase-gate.sh]
