# solo-orchestrator: platforms=web,desktop,mobile,mcp_server
image: node:20

definitions:
  caches:
    node: node_modules

pipelines:
  default:
    - parallel:
        - step:
            name: Lint + Test
            caches: [node]
            script:
              - npm ci
              - npm run lint
              - npm test -- --ci
        - step:
            name: SAST
            image: semgrep/semgrep
            script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
        - step:
            name: Secrets
            image: ghcr.io/gitleaks/gitleaks:v8.30.1
            script: [gitleaks dir . --verbose --redact]
        - step:
            name: Dependencies
            caches: [node]
            script: [npm ci, npm audit --audit-level=moderate]
    - step:
        name: Governance
        image: bash:5
        script: [apk add --no-cache jq git, bash scripts/check-phase-gate.sh]
