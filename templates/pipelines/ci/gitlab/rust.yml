# solo-orchestrator: platforms=desktop,mcp_server
# GitLab CI pipeline for Rust projects.
stages: [test, security, governance]
image: rust:1.75
cache:
  key: "${CI_COMMIT_REF_SLUG}-cargo"
  paths: [target/, ~/.cargo/]
lint:
  stage: test
  script:
    - cargo fmt --check
    - cargo clippy -- -D warnings
test:
  stage: test
  script:
    - cargo test --all-features
sast:
  stage: security
  image: semgrep/semgrep:1.170.0
  script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script: [gitleaks dir . --verbose --redact]
dependencies:
  stage: security
  script:
    - cargo install --locked cargo-audit
    - cargo audit
licenses:
  stage: security
  script:
    - cargo install --locked cargo-deny 2>/dev/null || true
    - cargo deny check licenses 2>/dev/null || echo "cargo-deny license check skipped"
governance:
  stage: governance
  image: bash:5
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
    - bash scripts/check-changelog.sh 2>/dev/null || true
