# solo-orchestrator: platforms=mobile,desktop
# GitLab CI pipeline for Kotlin projects.
stages: [test, security, governance]
image: gradle:8-jdk21
cache:
  key: "${CI_COMMIT_REF_SLUG}-gradle"
  paths: [.gradle/, build/]
test:
  stage: test
  script:
    - gradle test --no-daemon
    - gradle detekt --no-daemon 2>/dev/null || true
sast:
  stage: security
  image: semgrep/semgrep:1.170.0
  script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script: [gitleaks dir . --verbose --redact]
dependencies:
  stage: security
  script: [gradle dependencyCheckAnalyze --no-daemon 2>/dev/null || echo "OWASP Dependency-Check not configured"]
governance:
  stage: governance
  image: bash:5
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
