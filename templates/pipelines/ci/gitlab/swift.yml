# solo-orchestrator: platforms=mobile,desktop
# GitLab CI pipeline for Swift projects.
# NOTE: GitLab shared runners lack macOS — for iOS/macOS-specific builds, use
# self-hosted runners on macOS. This template assumes swift-on-linux.
stages: [test, security, governance]
image: swift:5.9
test:
  stage: test
  script:
    - swift build
    - swift test
sast:
  stage: security
  image: semgrep/semgrep:1.170.0
  script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script: [gitleaks dir . --verbose --redact]
governance:
  stage: governance
  image: bash:5
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
