# solo-orchestrator: platforms=web,desktop,mobile,mcp_server
# GitLab CI pipeline for TypeScript/JavaScript projects.

stages:
  - test
  - security
  - governance

image: node:20

variables:
  NPM_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "${CI_COMMIT_REF_SLUG}-node"
  paths:
    - .npm/
    - node_modules/

.setup_node: &setup_node
  before_script:
    - node --version
    - npm ci --cache .npm --prefer-offline

lint:
  stage: test
  <<: *setup_node
  script:
    - npm run lint
    - npm run typecheck 2>/dev/null || npx tsc --noEmit

test:
  stage: test
  <<: *setup_node
  script:
    - npm test -- --ci

sast:
  stage: security
  image: semgrep/semgrep:1.170.0
  script:
    - semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error

secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script:
    - gitleaks dir . --verbose --redact

dependencies:
  stage: security
  <<: *setup_node
  script:
    - npm audit --audit-level=moderate

licenses:
  stage: security
  <<: *setup_node
  script:
    - npx license-checker --summary --failOn "GPL;AGPL;SSPL"

governance:
  stage: governance
  image: bash:5
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
    - bash scripts/check-changelog.sh 2>/dev/null || true
    - |
      # BL-147: resolve the base explicitly, fail LOUDLY if unresolvable, no stderr silencer.
      if [ -f APPROVAL_LOG.md ]; then
        BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_DEFAULT_BRANCH:-main}}"
        git fetch origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_DEFAULT_BRANCH:-main}}" --quiet || true
        if ! git rev-parse --verify "$BASE^{commit}" >/dev/null; then
          echo "ERROR: approval-log check cannot resolve base '$BASE' — failing LOUDLY (a check that cannot run must not pass)"
          exit 1
        fi
        if git diff "$BASE...HEAD" -- APPROVAL_LOG.md | grep -qE '^\-[^-]'; then
          echo "ERROR: APPROVAL_LOG.md has deleted or modified lines (append-only)"
          exit 1
        fi
      fi
