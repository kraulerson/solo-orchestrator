# solo-orchestrator: platforms=desktop,web,mcp_server
# GitLab CI pipeline for C# / .NET projects.
stages: [test, security, governance]
image: mcr.microsoft.com/dotnet/sdk:8.0
cache:
  key: "${CI_COMMIT_REF_SLUG}-nuget"
  paths: [~/.nuget/packages/]
test:
  stage: test
  script:
    - dotnet restore
    - dotnet build --no-restore
    - dotnet test --no-build
sast:
  stage: security
  image: semgrep/semgrep
  script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script: [gitleaks dir . --verbose --redact]
dependencies:
  stage: security
  script: [dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/vuln.out; ! grep -qi "has the following vulnerable" /tmp/vuln.out]
governance:
  stage: governance
  image: bash:5
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
