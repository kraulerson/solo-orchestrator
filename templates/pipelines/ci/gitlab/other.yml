# solo-orchestrator: platforms=web,desktop,mobile,mcp_server
# GitLab CI pipeline for 'other' language track — placeholder with intentional failures.
# Builder must replace these scripts with language-appropriate equivalents before use.
stages: [test, security, governance]
image: bash:5
test:
  stage: test
  script:
    - echo "ERROR: Replace this with your test command (e.g., 'pytest', 'cargo test', etc.)"
    - exit 1  # intentional — CI should not pass until builder configures this
sast:
  stage: security
  image: semgrep/semgrep
  script: [semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error]
secrets:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:v8.30.1
  script: [gitleaks dir . --verbose --redact]
governance:
  stage: governance
  script:
    - apk add --no-cache jq git
    - bash scripts/check-phase-gate.sh
