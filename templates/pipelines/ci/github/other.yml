# solo-orchestrator: platforms=web,desktop,mobile,mcp_server
name: CI

# TODO: Customize these steps for your language and toolchain.
# This is a skeleton — uncomment and fill in the appropriate commands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7 (v7.0.1)
        with:
          fetch-depth: 0

      # TODO: Add language/runtime setup step
      # Example: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7 (v7.0.0), actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7 (v7.0.0),
      #   actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6 (v6.0.0), actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5 (v5.6.0), actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 (v7.0.0)

      # TODO: Install dependencies
      # - name: Install dependencies
      #   run: <your install command>

      # TODO: Lint
      # - name: Lint
      #   run: <your lint command>

      # TODO: Test
      # - name: Test
      #   run: <your test command>

      - name: Security - Secret detection (gitleaks)
        run: |
          # BL-151: run the gitleaks CLI directly — gitleaks-action needs GITLEAKS_LICENSE
          # for org accounts and a full clone; the CLI needs neither and mirrors the local hook.
          # `gitleaks git` scans full history — hence fetch-depth: 0 on checkout.
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git --redact --exit-code 1

      - name: Security - Dependency audit
        run: |
          echo "WARNING: No dependency audit tool configured for this language."
          echo "Configure a language-specific vulnerability scanner before Phase 3."
          echo "See docs/builders-guide.md for supported tools per language."
          exit 1

      - name: Security - License check
        if: always()
        run: |
          echo "WARNING: No license checker configured for this language."
          echo "Configure a language-specific license compliance tool before Phase 3."
          echo "See docs/builders-guide.md for supported tools per language."
          exit 1

      # ─── Governance (language-agnostic — do not remove) ──────────────
      # These governance steps apply to ALL languages and should remain
      # even when customizing the language-specific steps above.

      - name: Governance - Approval log integrity
        if: hashFiles('APPROVAL_LOG.md') != ''
        run: |
          # BL-147: resolve the diff base explicitly and fail LOUDLY if it cannot be resolved.
          # A default-depth checkout has no origin/main ref; a check that cannot run must not pass.
          BASE="origin/${{ github.base_ref || 'main' }}"
          if [ "${{ github.event_name }}" = "push" ]; then BASE="${{ github.event.before }}"; fi
          git fetch origin "${{ github.base_ref || 'main' }}" --quiet || true
          if ! git rev-parse --verify "$BASE" >/dev/null; then
            echo "::error::approval-log check cannot resolve base '$BASE' — failing LOUDLY (a check that cannot run must not pass)"; exit 1
          fi
          if git diff "$BASE...HEAD" -- APPROVAL_LOG.md | grep -qE '^\-[^-]'; then
            echo "::error::APPROVAL_LOG.md has deleted or modified lines. This file is append-only."; exit 1
          fi

      - name: Governance - Approval author verification
        if: hashFiles('APPROVAL_LOG.md') != ''
        run: |
          # BL-147: same explicit-base + loud-fail resolution as the integrity step.
          BASE="origin/${{ github.base_ref || 'main' }}"
          if [ "${{ github.event_name }}" = "push" ]; then BASE="${{ github.event.before }}"; fi
          git fetch origin "${{ github.base_ref || 'main' }}" --quiet || true
          if ! git rev-parse --verify "$BASE" >/dev/null; then
            echo "::error::approval-author check cannot resolve base '$BASE' — failing LOUDLY (a check that cannot run must not pass)"; exit 1
          fi
          # When APPROVAL_LOG.md is modified, check the commit author against the listed approver.
          if git diff --name-only "$BASE...HEAD" | grep -q 'APPROVAL_LOG.md'; then
            COMMIT_AUTHOR=$(git log --format='%an' "$BASE...HEAD" -- APPROVAL_LOG.md | head -1)
            ADDED_LINES=$(git diff "$BASE...HEAD" -- APPROVAL_LOG.md | grep '^+' | grep -i 'Approver' | head -1 || true)
            if [ -n "$ADDED_LINES" ] && [ -n "$COMMIT_AUTHOR" ]; then
              APPROVER_NAME=$(echo "$ADDED_LINES" | awk -F'|' '{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $3); gsub(/\*/, "", $3); gsub(/\+/, "", $3); print $3 }' | xargs)
              if [ -n "$APPROVER_NAME" ] && [ "$APPROVER_NAME" != "$COMMIT_AUTHOR" ]; then
                echo "::warning::Commit author ($COMMIT_AUTHOR) differs from listed approver ($APPROVER_NAME). Verify this is intentional."
                # Organizations wanting hard enforcement: change ::warning:: to ::error:: and uncomment: exit 1
              fi
            fi
          fi

      - name: Governance - Phase gate check
        if: hashFiles('.claude/phase-state.json') != ''
        run: |
          if [ ! -f scripts/check-phase-gate.sh ]; then
            echo "::error::Phase gate check script missing. Framework integrity compromised."
            exit 1
          fi
          bash scripts/check-phase-gate.sh

      - name: Governance - Changelog check
        run: bash scripts/check-changelog.sh 2>/dev/null || true
        # Tier 1.5: warning only. Set SOIF_STRICT_CHANGELOG=true to block.

      - name: Governance - Session state check
        run: bash scripts/check-session-state.sh 2>/dev/null || true
        # Tier 1.5: warning only. Set SOIF_STRICT_SESSION=true to block.

  # BL-148: SAST runs in the semgrep/semgrep container (replaces the archived
  # Semgrep GitHub Action). The scan's config + severity flags MIRROR the local
  # pre-commit hook (scripts/lib/hook-templates.sh) so CI and the dev gate enforce
  # the IDENTICAL ruleset. semgrep/semgrep is Alpine-based; GitHub's runner detects
  # that and runs JS actions (checkout) with its musl node build, so checkout works.
  sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7 (v7.0.1)
        with:
          fetch-depth: 0
      - name: Security - SAST (Semgrep)
        run: semgrep scan --config=p/owasp-top-ten --config=r/javascript.browser.security.insecure-document-method --severity=ERROR --error
