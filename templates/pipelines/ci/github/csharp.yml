# solo-orchestrator: platforms=web,desktop
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4 (v4.3.1)
        with:
          # Current LTS — update when next LTS releases
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Security - SAST (Semgrep)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1 (v0.58.0)
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            r/javascript.browser.security.insecure-document-method

      - name: Security - Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2 (v2.3.9)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security - Dependency audit
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
          ! grep -q "has the following vulnerable packages" vulnerability-report.txt

      - name: Security - License check
        run: |
          dotnet tool install --global dotnet-project-licenses
          dotnet-project-licenses --input . --fail-on "GPL-2.0-only;GPL-3.0-only;AGPL-3.0-only;LGPL-2.0-only;LGPL-2.1-only;LGPL-3.0-only;SSPL-1.0;EUPL-1.1;EUPL-1.2"
          # MPL-2.0 has file-level copyleft — review on a case-by-case basis if detected

      - name: Governance - Phase gate check
        if: hashFiles('.claude/phase-state.json') != ''
        run: bash scripts/check-phase-gate.sh 2>/dev/null || echo "Phase gate check script not found — skipping"

      - name: Governance - Changelog check
        run: bash scripts/check-changelog.sh 2>/dev/null || true

      - name: Governance - Session state check
        run: bash scripts/check-session-state.sh 2>/dev/null || true
