# solo-orchestrator: platforms=web,desktop,mcp_server
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 (v5.6.0)
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6 (v6.5.2)
        with:
          version: latest

      - name: Security - SAST (Semgrep)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1 (v0.58.0)
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit

      - name: Security - Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2 (v2.3.9)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security - Dependency audit
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Security - License check
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --disallowed_types=restricted
          # "restricted" covers GPL, AGPL, LGPL, SSPL, EUPL, and other copyleft licenses
          # MPL-2.0 has file-level copyleft — review on a case-by-case basis if detected

      - name: Governance - Phase gate check
        if: hashFiles('.claude/phase-state.json') != ''
        run: bash scripts/check-phase-gate.sh 2>/dev/null || echo "Phase gate check script not found — skipping"

      - name: Governance - Changelog check
        run: bash scripts/check-changelog.sh 2>/dev/null || true

      - name: Governance - Session state check
        run: bash scripts/check-session-state.sh 2>/dev/null || true
