# solo-orchestrator: platforms=web,desktop
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4 (v4.8.0)
        with:
          distribution: 'temurin'
          # Current LTS — update when next LTS releases
          java-version: '21'
          cache: 'gradle'

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Lint
        run: ./gradlew detekt
        continue-on-error: true
        # Requires detekt Gradle plugin. Add to build.gradle.kts:
        #   plugins { id("io.gitlab.arturbosch.detekt") version "1.23.+" }

      - name: Security - SAST (Semgrep)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1 (v0.58.0)
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit

      - name: Security - Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2 (v2.3.9)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security - Dependency audit
        run: ./gradlew dependencyCheckAnalyze
        # Requires OWASP dependency-check plugin. Add to build.gradle.kts:
        #   plugins { id("org.owasp.dependencycheck") version "9.+" }

      - name: Security - License check
        run: ./gradlew checkLicense
        # Requires a license plugin. Add to build.gradle.kts:
        #   plugins { id("com.github.jk1.dependency-license-report") version "2.+" }
        # Configure the plugin to block: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1,
        # LGPL-3.0, SSPL-1.0, EUPL-1.1, EUPL-1.2. See plugin docs for allowedLicenses config.
        # MPL-2.0 has file-level copyleft — review on a case-by-case basis if detected

      - name: Governance - Phase gate check
        if: hashFiles('.claude/phase-state.json') != ''
        run: bash scripts/check-phase-gate.sh 2>/dev/null || echo "Phase gate check script not found — skipping"

      - name: Governance - Changelog check
        run: bash scripts/check-changelog.sh 2>/dev/null || true

      - name: Governance - Session state check
        run: bash scripts/check-session-state.sh 2>/dev/null || true
