name: Release — __PROJECT_NAME__
# ─────────────────────────────────────────────────────────────────
# BEFORE FIRST RELEASE: Search for "TODO" in this file and configure:
#   - Deployment target (hosting platform, credentials)
#   - Environment variables and secrets
# The Phase 3→4 gate will warn if TODOs remain unconfigured.
# Light-track projects: this pipeline is optional for internal-only use.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7 (v7.0.1)

      - uses: __SETUP_ACTION__ # nosemgrep -- the value here is a build-time PLACEHOLDER token, not an action ref: init.sh substitutes a SHA-pinned action (BL-113). This entire trailing comment is STRIPPED when the template is rendered, so NO suppression ever ships into a generated project. __SOLO_TEMPLATE_ONLY__
        with:
          __SETUP_VERSION_KEY__: __SETUP_VERSION_VALUE__

      - name: Install dependencies
        run: __INSTALL_COMMAND__

      - name: Build
        run: __BUILD_COMMAND__

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json
        # If not using Node.js, replace the command above with your ecosystem's tool:
        #   Python:   pip install cyclonedx-bom && cyclonedx-py environment --output sbom.json
        #   Rust:     cargo install cargo-cyclonedx && cargo cyclonedx --format json
        #   Go:       go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest && cyclonedx-gomod app -output sbom.json
        #   .NET:     dotnet tool install --global CycloneDX && dotnet CycloneDX [project].csproj -o sbom.json

      - name: Deploy
        run: echo "TODO — deploy to hosting platform"
        # TODO: Deploy to your hosting platform. Examples:
        #   Vercel:   npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        #   Railway:  railway up --service ${{ vars.RAILWAY_SERVICE }}
        #   Netlify:  npx netlify deploy --prod --dir=dist

      - name: DAST scan (OWASP ZAP baseline)
        # Set PREVIEW_URL in repository variables (Settings -> Variables). It must
        # point to your deployed staging/production URL. DAST runs after deploy so
        # the application is live and reachable. The step is SKIPPED when
        # PREVIEW_URL is unset — a DAST scan has no target without it.
        #
        # This mirrors the Phase-3 scanner's verdict (run-phase3-validation.sh,
        # `# BL-122-ZAP-RISK-FILTER` + `# BL-140-ZAP-WORKDIR`): the RAW docker exit
        # code is NOT the verdict. ZAP baseline exits 1/2 for its own WARN/FAIL
        # thresholds over ALL alerts (informational included) — rule 10049
        # (Storable/Cacheable, riskcode 0) fires under EVERY Cache-Control value,
        # so a raw-exit gate is unpassable for real sites. The gate is instead a
        # jq count of Medium+ (riskcode >= 2) alerts; an absent/unparseable report
        # FAILs LOUDLY (a scan nobody can read is not a clean scan).
        if: vars.PREVIEW_URL != ''
        env:
          # BL-164 family (BL-146 review R-245-1): repo vars enter the shell
          # via env:, never by direct template expansion inside run: — vars.*
          # has NO semgrep backstop (the run-shell-injection rule matches only
          # the github context), so the Cg8 pin is the sole guard here.
          PREVIEW_URL: ${{ vars.PREVIEW_URL }}
        run: |
          # Mounted work dir — docker -v REQUIRES an ABSOLUTE host path (a relative
          # one is read as a named volume). ZAP writes -J JSON into /zap/wrk.
          ZAP_WORK="${GITHUB_WORKSPACE}/.zap-work"
          mkdir -p "$ZAP_WORK"
          # Capture the raw exit — do NOT let it be the verdict.
          rc=0
          docker run --rm -v "$ZAP_WORK:/zap/wrk" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "$PREVIEW_URL" -J zap-report.json || rc=$?
          REPORT="$ZAP_WORK/zap-report.json"
          # No report at all → a crash (docker/image/exec failure), not a skip: FAIL.
          if [ ! -s "$REPORT" ]; then
            echo "::error::OWASP ZAP produced no report (rc=$rc) — treat as a scan failure, not a pass"
            exit 1
          fi
          # rc >= 3 = execution error (docker error, image pull failure, ZAP crash).
          if [ "$rc" -ge 3 ]; then
            echo "::error::OWASP ZAP execution error (rc=$rc) — inspect $REPORT"
            exit 1
          fi
          # Judge Medium+ (riskcode >= 2) alerts ONLY. riskcode is a STRING in ZAP
          # JSON ("0".."3"); `// "0"` defaults a MISSING field to Informational,
          # never to blocking. An UNPARSEABLE report is a FAIL, never a pass.
          if ! findings=$(jq '[.site[]?.alerts[]? | select(((.riskcode // "0") | tonumber) >= 2)] | length' "$REPORT"); then
            echo "::error::ZAP report unparseable by jq — refusing to guess; inspect $REPORT"
            exit 1
          fi
          case "$findings" in ''|*[!0-9]*) findings=0 ;; esac
          if [ "$findings" -gt 0 ]; then
            echo "::error::$findings Medium+ ZAP alert(s) (riskcode>=2; baseline rc=$rc) — review $REPORT"
            exit 1
          fi
          echo "0 Medium+ ZAP alerts (baseline rc=$rc; informational/low, if any, remain in $REPORT)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3 (v3.0.2)
        with:
          generate_release_notes: true
          files: sbom.json
