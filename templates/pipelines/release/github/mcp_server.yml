name: Release — __PROJECT_NAME__
# ─────────────────────────────────────────────────────────────────
# MCP Server release pipeline.
# BEFORE FIRST RELEASE: Search for "TODO" in this file and configure:
#   - npm registry credentials (if publishing to npm)
#   - Docker registry credentials (if publishing Docker images)
#   - Environment variables and secrets
# The Phase 3→4 gate will warn if TODOs remain unconfigured.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (v4.4.0)
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: MCP Inspector smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"1.0.0"}}}' | \
          timeout 10 node dist/index.js || true

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Publish to npm
        run: echo "TODO — publish to npm registry"
        # TODO: Uncomment to publish:
        #   npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Docker image (optional — remove this section if not using Docker) ──
      - name: Build Docker image
        run: echo "TODO — build and push Docker image"
        # TODO: Uncomment and configure for your registry:
        #   docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .
        #   docker tag ghcr.io/${{ github.repository }}:${{ github.ref_name }} ghcr.io/${{ github.repository }}:latest

      - name: Push Docker image
        run: echo "TODO — push Docker image"
        # TODO: Uncomment after configuring:
        #   echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        #   docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        #   docker push ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 (v2.6.2)
        with:
          generate_release_notes: true
          files: sbom.json
