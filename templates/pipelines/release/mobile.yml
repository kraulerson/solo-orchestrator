# =============================================================================
# Mobile Release Pipeline — __PROJECT_NAME__
# =============================================================================
#
# This template contains four self-contained sections, one per framework path.
# Your language selection determines which section to use:
#
#   typescript / javascript  →  Section 1: Expo / EAS Build (React Native)
#   dart                     →  Section 2: Flutter
#   kotlin / java            →  Section 3: Native Android (Gradle)
#   swift                    →  Section 4: Native iOS (Xcode)
#
# Instructions:
#   1. Uncomment the section that matches your framework.
#   2. Delete the other sections entirely.
#   3. Each section has its own setup steps — no shared placeholders are needed
#      because the toolchains differ significantly between frameworks.
#
# =============================================================================

name: Release — __PROJECT_NAME__
# ─────────────────────────────────────────────────────────────────
# BEFORE FIRST RELEASE: Search for "TODO" in this file and configure:
#   - Code signing (iOS certificates, Android keystore)
#   - App store credentials (App Store Connect, Google Play)
#   - Build configuration for your framework section
# The Phase 3→4 gate will warn if TODOs remain unconfigured.
# Light-track projects: this pipeline is optional for internal-only use.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

